name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Type Check ────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npm run typecheck

  # ─── Validate Example Specs ────────────────────────────────────────────────
  validate-examples:
    name: Validate Example Specs
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate student-portal spec
        run: npx tsx src/cli/index.ts validate examples/student-portal.forge.yaml --json

  # ─── Dry-run Code Generation ───────────────────────────────────────────────
  generate-dryrun:
    name: Code Generation (dry-run)
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Dry-run generate from example spec
        run: npx tsx src/cli/index.ts generate examples/student-portal.forge.yaml --dry-run

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: [validate-examples, generate-dryrun]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build CLI binary
        run: npm run build

      - name: Verify CLI binary exists
        run: test -f dist/cli/index.js && echo "✓ CLI binary built successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-cli
          path: dist/
